[platformio]
default_envs = esp32dev

; Dev build — DEBUG flag enables Serial logging and disables cert verification
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/load_env.py
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit PN532@^1.3.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
monitor_speed = 115200
build_flags =
    -DDEBUG

; Native env — unit tests only, no hardware dependencies
[env:native]
platform = native
build_flags =
    -std=c++17
    -DNATIVE_BUILD
test_build_src = false

; Production build — no Serial logging, cert verification enabled (CA cert TBD)
[env:production]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:scripts/load_env.py
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit PN532@^1.3.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
monitor_speed = 115200
